# TCP Service
apiVersion: v1
kind: Service
metadata:
  name: shark-socket-tcp
  namespace: shark-socket
  labels:
    app.kubernetes.io/name: shark-socket
    app.kubernetes.io/component: gateway
    protocol: tcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: shark-socket
    app.kubernetes.io/component: gateway
  ports:
    - name: tcp
      port: 18000
      targetPort: tcp
      protocol: TCP

