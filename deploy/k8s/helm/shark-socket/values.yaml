# Default values for shark-socket.

image:
  repository: x1asheng/shark-socket
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

# Pod disruption budget
pdb:
  enabled: true
  minAvailable: 1

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 70

# Network policies
networkPolicies:
  enabled: true

# Service Monitor for Prometheus Operator
serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource limits
resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Termination grace period
terminationGracePeriodSeconds: 60

# Protocols configuration
protocols:
  tcp:
    enabled: true
    host: "0.0.0.0"
    port: 18000
  udp:
    enabled: true
    host: "0.0.0.0"
    port: 18200
  http:
    enabled: true
    host: "0.0.0.0"
    port: 18400
  websocket:
    enabled: true
    host: "0.0.0.0"
    port: 18600
    path: "/ws"
  coap:
    enabled: true
    host: "0.0.0.0"
    port: 18800
  quic:
    enabled: false
    host: "0.0.0.0"
    port: 18900
  grpcweb:
    enabled: false
    host: "0.0.0.0"
    port: 18650

# Metrics
metrics:
  enabled: true
  port: 9091
  addr: ":9091"

# Application config
config:
  logLevel: "info"
  logFormat: "json"
  shutdownTimeout: "60s"

# Ingress
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - shark-socket
          topologyKey: kubernetes.io/hostname

# Service account
serviceAccount:
  create: false
  name: ""
