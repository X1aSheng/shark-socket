{{- if .Values.protocols.tcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: shark-socket-tcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shark-socket.labels" . | nindent 4 }}
    protocol: tcp
spec:
  type: ClusterIP
  selector:
    {{- include "shark-socket.selectorLabels" . | nindent 4 }}
  ports:
    - name: tcp
      port: {{ .Values.protocols.tcp.port }}
      targetPort: tcp
      protocol: TCP
---
{{- end }}
