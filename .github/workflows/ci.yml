name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Unit Tests Matrix (multi-OS, multi-Go)
  # ─────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.26', 'stable']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with race detector (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: go test -race -v -count=1 -timeout 180s ./...

      - name: Run tests (Windows, no race — CGO not available)
        if: matrix.os == 'windows-latest'
        run: go test -v -count=1 -timeout 180s ./...

      - name: Run tests with coverage (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: go test -coverprofile=coverage.out -count=1 -timeout 180s ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print int($3)}')
          echo "Coverage: ${COVERAGE}%"
          if [ "$COVERAGE" -lt 30 ]; then
            echo "Coverage ${COVERAGE}% is below 30% threshold"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # Job 2: Integration Tests
  # ─────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run integration tests (tests/integration/)
        run: go test -race -v -count=1 -timeout 300s ./tests/integration/...

      - name: Run protocol integration tests
        run: |
          go test -race -v -count=1 -timeout 120s ./internal/protocol/tcp/... -run 'Integration'
          go test -race -v -count=1 -timeout 120s ./internal/protocol/udp/... -run 'Integration'
          go test -race -v -count=1 -timeout 120s ./internal/protocol/coap/... -run 'Integration'
          go test -race -v -count=1 -timeout 120s ./internal/protocol/http/... -run 'Integration'
          go test -race -v -count=1 -timeout 120s ./internal/protocol/websocket/... -run 'Integration'

  # ─────────────────────────────────────────────────────────────
  # Job 3: Plugin Tests
  # ─────────────────────────────────────────────────────────────
  test-plugin:
    name: Plugin Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run plugin tests
        run: go test -race -v -count=1 ./internal/plugin/...

      - name: Run plugin benchmarks
        run: go test -bench=. -benchmem -run=^$ -count=1 ./internal/plugin/...

  # ─────────────────────────────────────────────────────────────
  # Job 4: Code Quality
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          go fmt ./...
          if ! git diff --exit-code -- '*.go'; then
            echo "Files not formatted. Run 'go fmt ./...' locally."
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

  # ─────────────────────────────────────────────────────────────
  # Job 5: Build Verification (multi-OS, multi-Go)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.26', 'stable']
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build all packages
        run: go build -v ./...

      - name: Build production binary
        run: go build ./cmd/shark-socket/

      - name: Build examples
        run: go build ./examples/...

      - name: Verify module
        run: go mod verify

  # ─────────────────────────────────────────────────────────────
  # Job 6: Docker Build & Smoke Test
  # ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile -t shark-socket:ci .

      - name: Start container
        run: |
          docker run -d --name shark-ci \
            -p 18000:18000 -p 18400:18400 -p 9091:9091 \
            shark-socket:ci
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9091/healthz >/dev/null 2>&1; then
              echo "Container healthy."
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Container did not become healthy."
          docker logs shark-ci
          exit 1

      - name: Protocol smoke test
        run: |
          echo "=== Health check ==="
          curl -sf http://localhost:9091/healthz && echo "OK"
          echo "=== Metrics endpoint ==="
          curl -sf http://localhost:9091/metrics | head -5
          echo "=== TCP connectivity ==="
          timeout 2 bash -c 'echo >/dev/tcp/localhost/18000' 2>/dev/null && echo "TCP port reachable" || echo "TCP check skipped (expected if no client connected)"

      - name: Cleanup
        if: always()
        run: docker rm -f shark-ci

  # ─────────────────────────────────────────────────────────────
  # Job 7: Deploy Manifest Check
  # ─────────────────────────────────────────────────────────────
  deploy-check:
    name: Deploy Manifest Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose -f deploy/docker/docker-compose.yml config

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/k8s/helm/shark-socket/

      - name: Validate Helm templates
        run: |
          helm template shark-socket deploy/k8s/helm/shark-socket/ \
            --namespace shark-socket \
            --values deploy/k8s/helm/shark-socket/values.yaml > /dev/null
          helm template shark-socket deploy/k8s/helm/shark-socket/ \
            --namespace shark-socket \
            --values deploy/k8s/helm/shark-socket/values.yaml \
            --values deploy/k8s/helm/shark-socket/values-prod.yaml > /dev/null
