apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shark-socket
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: shark-socket
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "shark-socket"
        metrics_path: /metrics
        static_configs:
          - targets: ["shark-socket-metrics:9091"]
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: "shark-socket"
