apiVersion: apps/v1
kind: Deployment
metadata:
  name: shark-socket
  namespace: shark-socket
  labels:
    app.kubernetes.io/name: shark-socket
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: shark-socket
      app.kubernetes.io/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shark-socket
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: shark-socket
          image: x1asheng/shark-socket:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp
              containerPort: 18000
              protocol: TCP
            - name: udp
              containerPort: 18200
              protocol: UDP
            - name: http
              containerPort: 18400
              protocol: TCP
            - name: websocket
              containerPort: 18600
              protocol: TCP
            - name: coap
              containerPort: 18800
              protocol: UDP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: SHARK_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - shark-socket
                topologyKey: kubernetes.io/hostname
