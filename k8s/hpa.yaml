apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shark-socket
  namespace: shark-socket
  labels:
    app.kubernetes.io/name: shark-socket
    app.kubernetes.io/component: gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shark-socket
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: shark-socket
  namespace: shark-socket
  labels:
    app.kubernetes.io/name: shark-socket
    app.kubernetes.io/component: gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shark-socket
      app.kubernetes.io/component: gateway
