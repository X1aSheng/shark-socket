version: "3.8"

services:
  shark-socket:
    build: .
    ports:
      - "18000:18000"   # TCP
      - "18200:18200/udp" # UDP
      - "18400:18400"   # HTTP
      - "18600:18600"   # WebSocket
      - "18800:18800/udp" # CoAP
      - "9090:9090"   # Metrics
    environment:
      - SHARK_LOG_LEVEL=info
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - shark-socket
